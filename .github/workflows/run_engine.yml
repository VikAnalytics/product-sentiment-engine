name: Daily Sentiment Engine

on:
  workflow_dispatch: # Triggered externally via cron-job.org at 5pm EST daily

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # We need permissions to commit the final report back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Check if today is Monday
        id: check_day
        run: |
          echo "is_monday=$([ $(date +%u) -eq 1 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Run Daily Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          PYTHONPATH=src python src/scout.py
          PYTHONPATH=src python src/sec_scout.py
          PYTHONPATH=src python src/tracker.py
          PYTHONPATH=src python src/price_fetcher.py
          PYTHONPATH=src python src/price_correlator.py
          PYTHONPATH=src python src/report.py

      - name: Run Weekly Brief (Mondays only)
        if: steps.check_day.outputs.is_monday == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          PYTHONPATH=src python src/weekly_brief.py

      - name: Save Reports to GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Auto-generated daily market report" || echo "No changes to commit"
          git pull --rebase origin main
          git push
