name: Daily Sentiment Engine

on:
  workflow_dispatch: # Allows cron-job.org or manual triggers
  schedule:
    - cron: '0 7 * * *'  # Every day at 07:00 UTC
    - cron: '0 7 * * 1'  # Every Monday at 07:00 UTC — triggers weekly brief

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # We need permissions to commit the final report back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Daily Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          PYTHONPATH=src python src/scout.py
          PYTHONPATH=src python src/sec_scout.py
          PYTHONPATH=src python src/tracker.py
          PYTHONPATH=src python src/price_fetcher.py
          PYTHONPATH=src python src/price_correlator.py
          PYTHONPATH=src python src/report.py

      - name: Run Weekly Brief (Mondays only)
        if: github.event.schedule == '0 7 * * 1'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          PYTHONPATH=src python src/weekly_brief.py

      - name: Save Reports to GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Auto-generated daily market report" || echo "No changes to commit"
          git pull --rebase origin main
          git push
