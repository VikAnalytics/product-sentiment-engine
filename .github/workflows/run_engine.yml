name: Daily Sentiment Engine

on:
  workflow_dispatch: # This single line allows cron-job.org to trigger the engine remotely

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # We need permissions to commit the final report back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run V2 Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python src/scout.py
          python src/tracker.py
          python src/report.py

      - name: Save Daily Report to GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Auto-generated daily market report" || echo "No changes to commit"
          git push